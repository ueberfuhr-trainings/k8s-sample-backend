name: CI-Build

env:
  DOCKER_IMAGE: ralfueberfuhr/recipes-backend

on:
  push:
    branches:
      - "main"
  pull_request:

# Required GitHub Secrets for Docker Hub push:
#   DOCKERHUB_USERNAME - Docker Hub username
#   DOCKERHUB_TOKEN    - Docker Hub Personal Access Token (PAT)
#                        (must have read/write/delete scope for pushrm to update the description)

jobs:
  build-app:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - profile: "prod"
            artifact-name: quarkus-app
          - profile: "dev"
            artifact-name: quarkus-app-dev
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven (${{ matrix.profile }} profile)
        run: "mvn -B package -Dquarkus.profile=${{ matrix.profile }} --file pom.xml"
      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/quarkus-app/

  build-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-app
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - profile: "prod"
            artifact-name: quarkus-app
            tag-suffix: ""
          - profile: "dev"
            artifact-name: quarkus-app-dev
            tag-suffix: "-dev"
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Extract version from pom.xml
        id: version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --file pom.xml)" >> $GITHUB_OUTPUT
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/quarkus-app/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: QUARKUS_PROFILE=${{ matrix.profile }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest${{ matrix.tag-suffix }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}${{ matrix.tag-suffix }}
      - name: Update Docker Hub description
        if: matrix.tag-suffix == ''
        uses: christian-korneck/update-container-description-action@v1
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          destination_container_repo: ${{ env.DOCKER_IMAGE }}
          provider: dockerhub
          short_description: "A backend managing recipes"
          readme_file: src/main/docker/README.md
